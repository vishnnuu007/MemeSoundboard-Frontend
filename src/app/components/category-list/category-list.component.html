<div class="container mt-3 mt-md-4 pb-4">

  <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-2 mb-3">
    <h2 class="page-heading mb-0">📂 Categories</h2>
    <button *ngIf="authService.isLoggedIn()" class="btn btn-success add-btn tap-scale" routerLink="/categories/add">
      + Add Category
    </button>
  </div>

  <!-- Desktop table -->
  <table class="table table-bordered table-hover d-none d-md-table">

    <thead class="table-dark">
      <tr>
        <th style="width:120px;">Icon</th>
        <th>Name</th>
        <th style="width:180px;" *ngIf="authService.isLoggedIn()">Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let category of categories" class="clickable-row" (click)="viewMemes(category.id)">
        <td class="text-center fs-4">{{category.icon}}</td>
        <td>{{category.name}}</td>
        <td *ngIf="authService.isLoggedIn()">
          <button class="btn btn-primary btn-sm me-2" (click)="editCategory(category.id); $event.stopPropagation()">Edit</button>
          <button class="btn btn-danger btn-sm" (click)="deleteCategory(category.id); $event.stopPropagation()">Delete</button>
        </td>
      </tr>

      <tr *ngIf="categories.length==0">
        <td colspan="3" class="text-center">No Categories Found</td>
      </tr>
    </tbody>

  </table>

  <!-- Mobile card list -->
  <div class="d-md-none">

    <div
      class="category-row-card stagger-item"
      [style.--i]="i"
      *ngFor="let category of categories; let i = index"
      (click)="viewMemes(category.id)">

      <div class="category-icon">{{category.icon}}</div>
      <div class="category-name">{{category.name}}</div>
      <div class="category-row-actions" *ngIf="authService.isLoggedIn()">
        <button class="btn btn-primary btn-sm tap-scale" (click)="editCategory(category.id); $event.stopPropagation()">Edit</button>
        <button class="btn btn-danger btn-sm tap-scale" (click)="deleteCategory(category.id); $event.stopPropagation()">Delete</button>
      </div>
    </div>

    <div *ngIf="categories.length==0" class="empty-state anim-fade-up">
      <div class="empty-emoji">📂</div>
      <h4>No Categories Found</h4>
    </div>

  </div>

</div>
